{% extends "base.html" %}
{% block title %}Donor Login — LifeFlow{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-card">
    <div style="text-align:center; margin-bottom:32px;">
      <div style="font-size:3rem; margin-bottom:12px;">🔐</div>
      <h1 class="form-title">Donor Login</h1>
      <p class="form-sub">Sign in to access your donor dashboard and manage your profile.</p>
    </div>

    <form action="{{ url_for('donor_login') }}" method="POST">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required autofocus />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Your password" required />
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:14px; margin-top:8px;">
        Login to Dashboard →
      </button>
    </form>

    <hr class="form-divider" />

    <div class="form-footer">
      Not registered yet? <a href="{{ url_for('donor_register') }}">Create an account</a>
    </div>
    <div class="form-footer mt-1">
      Are you an admin? <a href="{{ url_for('admin_login') }}">Admin Login</a>
    </div>
  </div>
</div>
{% endblock %}
